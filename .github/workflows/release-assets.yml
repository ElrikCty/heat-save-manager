name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-asset:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: windows-2022
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Windows executable
        run: wails build -platform windows/amd64 -clean -nopackage -nosyncgomod -m

      - name: Package release archive
        shell: powershell
        run: |
          if (-not $env:TAG_NAME) {
            throw "TAG_NAME is missing"
          }

          $assetName = "HeatSaveManager-$env:TAG_NAME-windows-x64.zip"
          $assetPath = "build/bin/$assetName"

          if (-not (Test-Path "build/bin/HeatSaveManager.exe")) {
            throw "Expected build/bin/HeatSaveManager.exe was not found"
          }

          Compress-Archive -Path "build/bin/HeatSaveManager.exe" -DestinationPath $assetPath -Force
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload asset to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG_NAME" "build/bin/$ASSET_NAME" --clobber
