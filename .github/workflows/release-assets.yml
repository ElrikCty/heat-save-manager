name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-asset:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: windows-2022
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Windows executable
        shell: powershell
        run: |
          if (-not $env:TAG_NAME) {
            throw "TAG_NAME is missing"
          }

          wails build -platform windows/amd64 -clean -nopackage -nosyncgomod -m -ldflags "-X main.appVersion=$env:TAG_NAME"

      - name: Package release archive
        shell: powershell
        run: |
          if (-not $env:TAG_NAME) {
            throw "TAG_NAME is missing"
          }

          $assetName = "HeatSaveManager-$env:TAG_NAME-windows-x64.zip"
          $assetPath = "build/bin/$assetName"

          if (-not (Test-Path "build/bin/HeatSaveManager.exe")) {
            throw "Expected build/bin/HeatSaveManager.exe was not found"
          }

          Compress-Archive -Path "build/bin/HeatSaveManager.exe" -DestinationPath $assetPath -Force
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload asset to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: powershell
        run: |
          if (-not $env:TAG_NAME) {
            throw "TAG_NAME is missing"
          }

          if (-not $env:ASSET_NAME) {
            throw "ASSET_NAME is missing"
          }

          $assetPath = "build/bin/$env:ASSET_NAME"
          if (-not (Test-Path $assetPath)) {
            throw "Expected asset not found at $assetPath"
          }

          $maxAttempts = 6
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            gh release view "$env:TAG_NAME" --repo "$env:GH_REPO" | Out-Null
            if ($LASTEXITCODE -eq 0) {
              break
            }

            if ($attempt -eq $maxAttempts) {
              throw "Release $env:TAG_NAME not available after $maxAttempts attempts"
            }

            Start-Sleep -Seconds 10
          }

          gh release upload "$env:TAG_NAME" "$assetPath" --clobber --repo "$env:GH_REPO"
