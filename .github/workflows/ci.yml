name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Verify generated bindings policy
        run: |
          if [ -n "$(git ls-files frontend/wailsjs)" ]; then
            echo "::error::frontend/wailsjs must not be tracked by git."
            git ls-files frontend/wailsjs
            exit 1
          fi
          if ! git check-ignore -q frontend/wailsjs/go/main/App.js; then
            echo "::error::frontend/wailsjs is expected to be ignored by .gitignore."
            exit 1
          fi

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Run Go tests
        run: go test ./...

      - name: Verify clean working tree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Repository became dirty during CI checks."
            git status --short
            exit 1
          fi
